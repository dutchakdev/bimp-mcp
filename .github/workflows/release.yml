name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Publish to npm
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish to GitHub Packages
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@dutchakdev'

      - name: Publish to GitHub Packages
        run: |
          cat > .npmrc <<EOF
          @dutchakdev:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}
          EOF
          npm pkg set name='@dutchakdev/bimp-mcp'
          npm publish --access public
          npm pkg set name='bimp-mcp'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pack tarball for GitHub Release
      - run: npm pack

      # Extract release notes from annotated tag message
      - name: Extract release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Get tag annotation (skip first line which is the version title)
          NOTES=$(git tag -l --format='%(contents:body)' "$TAG")
          if [ -z "$NOTES" ]; then
            # Fallback: generate from commits since previous tag
            PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log "$PREV_TAG".."$TAG" --pretty=format:"- %s" --no-merges | grep -v "^- release:" || true)
            else
              NOTES="Initial release"
            fi
          fi
          # Write to file for multiline support
          echo "$NOTES" > /tmp/release-notes.md

      # Create GitHub Release with notes + tarball
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: bimp-mcp-*.tgz
